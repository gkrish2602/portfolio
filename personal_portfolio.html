<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gokul Krishnan N — Full Stack Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,300;1,400&family=Pacifico&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
/* ══════════════════════════════════════
   ROOT & RESET
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Fresh teal-to-coral palette — vibrant & airy */
  --navy:    #1b2a4a;
  --navy2:   #243560;
  --teal:    #00b4d8;
  --teal2:   #0096c7;
  --teal3:   #48cae4;
  --coral:   #ff6b6b;
  --coral2:  #ee5a24;
  --mint:    #06d6a0;
  --yellow:  #ffd166;
  --purple:  #845ef7;
  --bg:      #f8fbff;
  --bg2:     #eef6ff;
  --bg3:     #e3f2ff;
  --white:   #ffffff;
  --text:    #1b2a4a;
  --text2:   #3d5a8a;
  --muted:   #6b84b0;
  --dim:     #96aacb;
  --border:  #d8e8f8;
  --card-sh: 0 4px 24px rgba(0,100,200,0.10);
  --card-sh-hover: 0 12px 40px rgba(0,100,200,0.18);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  line-height: 1.6;
  overflow-x: hidden;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 3px; }

/* ══════════════════════════════════════
   NAVBAR — matches reference: navy bg, script font logo
══════════════════════════════════════ */
.navbar {
  position: sticky; top: 0; z-index: 999;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 56px;
  height: 68px;
  background: var(--navy);
  box-shadow: 0 2px 20px rgba(27,42,74,0.3);
  transition: all 0.3s;
}
.nav-brand {
  font-family: 'Pacifico', cursive;
  font-size: 26px; color: #fff;
  text-decoration: none; cursor: pointer;
  letter-spacing: 0.5px;
}
.nav-links { display: flex; align-items: center; gap: 6px; }
.nav-link {
  background: none; border: none; color: rgba(255,255,255,0.75);
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 600;
  padding: 8px 16px; cursor: pointer; border-radius: 6px;
  transition: all 0.2s; letter-spacing: 0.2px;
}
.nav-link:hover, .nav-link.active {
  color: #fff;
  background: rgba(255,255,255,0.15);
}
.nav-socials { display: flex; align-items: center; gap: 12px; }
.nav-social {
  color: rgba(255,255,255,0.75); font-size: 20px;
  text-decoration: none; transition: all 0.2s;
  display: flex; align-items: center;
}
.nav-social:hover { color: var(--teal3); transform: translateY(-2px); }

/* ══════════════════════════════════════
   HERO — white bg, big greeting
══════════════════════════════════════ */
.hero {
  background: var(--white);
  min-height: calc(100vh - 68px);
  display: flex; align-items: center;
  padding: 60px 80px;
  position: relative; overflow: hidden;
}
/* subtle wavy bg shapes */
.hero::before {
  content: '';
  position: absolute; right: -120px; top: -120px;
  width: 600px; height: 600px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,180,216,0.07) 0%, transparent 70%);
  pointer-events: none;
}
.hero::after {
  content: '';
  position: absolute; left: -80px; bottom: -80px;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(6,214,160,0.06) 0%, transparent 70%);
  pointer-events: none;
}
.hero-inner {
  max-width: 1200px; margin: 0 auto; width: 100%;
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 60px; align-items: center; position: relative; z-index: 1;
}

.hero-wave { font-size: 40px; display: inline-block; animation: waveHand 2.5s ease infinite; transform-origin: 70% 70%; }
@keyframes waveHand {
  0%,60%,100%{ transform: rotate(0deg); }
  10%,30%{ transform: rotate(18deg); }
  20%{ transform: rotate(-8deg); }
}

.hero-greeting {
  font-size: 18px; font-weight: 700; color: var(--teal2);
  letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px;
}
.hero-name {
  font-size: clamp(40px, 5.5vw, 70px); font-weight: 900;
  line-height: 1.05; letter-spacing: -1.5px; color: var(--navy);
  margin-bottom: 8px;
}
.hero-name .grad {
  background: linear-gradient(135deg, var(--teal), var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hero-role {
  font-size: clamp(18px, 2.2vw, 26px); font-weight: 700;
  color: var(--coral); margin-bottom: 20px;
}
.hero-desc {
  font-size: 16px; color: var(--muted); line-height: 1.85;
  max-width: 500px; margin-bottom: 36px; font-weight: 400;
}

.btn-primary {
  background: linear-gradient(135deg, var(--teal), #0077b6);
  color: #fff; padding: 14px 36px; border: none;
  font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; border-radius: 50px; text-decoration: none;
  display: inline-block; transition: all 0.25s;
  box-shadow: 0 6px 24px rgba(0,150,199,0.35);
  letter-spacing: 0.3px;
}
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,150,199,0.5); }
.btn-outline {
  background: transparent; border: 2px solid var(--navy);
  color: var(--navy); padding: 12px 34px;
  font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
  cursor: pointer; border-radius: 50px; text-decoration: none;
  display: inline-block; transition: all 0.25s; margin-left: 14px;
}
.btn-outline:hover { background: var(--navy); color: #fff; transform: translateY(-3px); }

/* Hero right — illustration area */
.hero-right { display: flex; align-items: center; justify-content: center; position: relative; }
.hero-img-wrap {
  animation: floatY 4s ease-in-out infinite alternate;
  width: 100%; max-width: 480px;
}
@keyframes floatY { 0%{ transform:translateY(0) } 100%{ transform:translateY(-18px) } }

/* ══════════════════════════════════════
   SECTION SHARED
══════════════════════════════════════ */
.section { padding: 90px 0; }
.section-inner { max-width: 1200px; margin: 0 auto; padding: 0 56px; }
.section-bg-light { background: var(--bg2); }
.section-bg-white { background: var(--white); }

.sec-eyebrow {
  font-size: 12px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--teal2); margin-bottom: 8px;
  text-align: center;
}
.sec-title {
  font-size: clamp(28px, 4vw, 46px); font-weight: 900;
  letter-spacing: -1px; color: var(--navy); line-height: 1.1;
  text-align: center; margin-bottom: 12px;
}
.sec-title .c-teal { color: var(--teal2); }
.sec-title .c-coral { color: var(--coral); }
.sec-title .c-purple { color: var(--purple); }
.sec-underline {
  width: 64px; height: 4px; border-radius: 2px; margin: 0 auto 56px;
  background: linear-gradient(90deg, var(--teal), var(--coral));
}

/* ══════════════════════════════════════
   WHAT I DO — matches reference layout exactly:
   illustration LEFT, content RIGHT
══════════════════════════════════════ */
.whatido-layout {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 64px; align-items: center;
}
.whatido-tagline {
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--dim); margin-bottom: 48px; text-align: center;
  font-weight: 700;
}

.whatido-title {
  font-size: 28px; font-weight: 900; color: var(--navy); margin-bottom: 28px;
  display: flex; align-items: center; gap: 10px;
}
.whatido-title span { font-size: 28px; }

/* Tech icon grid — exactly like screenshot */
.tech-icon-row {
  display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 32px;
}
.tech-bubble {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--white); border: 1px solid var(--border);
  box-shadow: var(--card-sh);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; transition: all 0.25s; cursor: default;
  position: relative;
}
.tech-bubble:hover { transform: translateY(-4px) scale(1.08); box-shadow: var(--card-sh-hover); border-color: var(--teal3); }
.tech-bubble .tech-tip {
  position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
  font-size: 10px; font-weight: 700; color: var(--navy); white-space: nowrap;
  background: var(--white); border: 1px solid var(--border);
  padding: 2px 8px; border-radius: 4px;
  opacity: 0; transition: opacity 0.2s; pointer-events: none;
}
.tech-bubble:hover .tech-tip { opacity: 1; }

.whatido-points { display: flex; flex-direction: column; gap: 14px; }
.whatido-point {
  display: flex; align-items: flex-start; gap: 12px;
  font-size: 15px; color: var(--text2); line-height: 1.6;
}
.point-bolt { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

/* ══════════════════════════════════════
   SKILLS — progress bars
══════════════════════════════════════ */
.skills-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; }
.skill-col-title {
  font-size: 16px; font-weight: 800; color: var(--navy);
  margin-bottom: 28px; padding-left: 14px;
  border-left: 4px solid var(--teal);
  letter-spacing: 0.3px;
}
.skill-bar-wrap { margin-bottom: 22px; }
.skill-bar-top {
  display: flex; justify-content: space-between; margin-bottom: 8px;
}
.skill-bar-name { font-size: 14px; font-weight: 700; color: var(--text); }
.skill-bar-pct {
  font-family: 'Source Code Pro', monospace; font-size: 13px;
  font-weight: 600; color: var(--teal2);
}
.skill-bar-track {
  height: 9px; background: var(--bg3);
  border-radius: 5px; overflow: hidden;
}
.skill-bar-fill {
  height: 100%; border-radius: 5px; width: 0%;
  background: linear-gradient(90deg, var(--teal), #0077b6);
  transition: width 1.4s ease;
}

/* Tech badges row */
.tech-chips-row {
  display: flex; flex-wrap: wrap; gap: 12px;
  margin-top: 48px; justify-content: center;
}
.tech-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 50px; padding: 10px 18px;
  font-size: 13px; font-weight: 700; color: var(--text2);
  box-shadow: var(--card-sh); transition: all 0.25s; cursor: default;
}
.tech-chip:hover { border-color: var(--teal); color: var(--teal2); transform: translateY(-3px); box-shadow: var(--card-sh-hover); }
.tech-chip .e { font-size: 18px; }

/* ══════════════════════════════════════
   EDUCATION & EXPERIENCE (side by side)
══════════════════════════════════════ */
.edu-exp-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; }

.col-heading {
  font-size: 20px; font-weight: 900; color: var(--navy);
  margin-bottom: 28px; display: flex; align-items: center; gap: 10px;
}

/* timeline */
.timeline { position: relative; padding-left: 22px; }
.timeline::before {
  content: ''; position: absolute; left: 6px; top: 4px; bottom: 4px; width: 2px;
  background: linear-gradient(180deg, var(--teal), var(--coral)); border-radius: 2px;
}
.tl-item { position: relative; margin-bottom: 28px; }
.tl-item::before {
  content: ''; position: absolute; left: -19px; top: 10px;
  width: 11px; height: 11px; border-radius: 50%;
  background: var(--teal); box-shadow: 0 0 0 3px rgba(0,180,216,0.2);
}
.tl-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 22px 24px;
  box-shadow: var(--card-sh); transition: all 0.3s;
}
.tl-card:hover { transform: translateX(5px); box-shadow: var(--card-sh-hover); border-color: rgba(0,180,216,0.35); }
.tl-date {
  font-family: 'Source Code Pro', monospace; font-size: 11px;
  color: var(--teal2); font-weight: 600; letter-spacing: 0.5px;
  text-transform: uppercase; margin-bottom: 6px;
}
.tl-title { font-size: 15px; font-weight: 800; color: var(--navy); margin-bottom: 4px; }
.tl-org { font-size: 13px; color: var(--teal2); font-style: italic; margin-bottom: 8px; }
.tl-badge {
  display: inline-block; font-size: 11px; font-weight: 700;
  background: linear-gradient(135deg, var(--mint), #00b09b);
  color: #fff; padding: 3px 12px; border-radius: 20px;
}
.tl-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-top: 10px; }

/* exp card with logo */
.exp-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 14px; padding: 24px;
  box-shadow: var(--card-sh); transition: all 0.3s; margin-bottom: 0;
}
.exp-card:hover { box-shadow: var(--card-sh-hover); border-color: rgba(0,180,216,0.35); }
.exp-card-top {
  display: flex; align-items: flex-start; gap: 16px; margin-bottom: 14px;
}
.exp-logo {
  width: 52px; height: 52px; border-radius: 12px;
  background: linear-gradient(135deg, var(--navy), var(--navy2));
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; flex-shrink: 0; box-shadow: 0 4px 12px rgba(27,42,74,0.2);
}
.exp-co { font-size: 17px; font-weight: 900; color: var(--navy); }
.exp-role-name { font-size: 13px; color: var(--coral); font-weight: 700; margin-top: 2px; }
.exp-period {
  font-family: 'Source Code Pro', monospace; font-size: 11px;
  color: var(--dim); margin-left: auto; text-align: right; line-height: 1.5;
}
.exp-desc { font-size: 13px; color: var(--muted); line-height: 1.75; }
.exp-highlight { color: var(--teal2); font-weight: 700; }

/* ══════════════════════════════════════
   PROJECTS
══════════════════════════════════════ */
.projects-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
.proj-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 16px; overflow: hidden;
  box-shadow: var(--card-sh); transition: all 0.3s; cursor: default;
}
.proj-card:hover { transform: translateY(-8px); box-shadow: var(--card-sh-hover); border-color: rgba(0,180,216,0.3); }
.proj-banner {
  height: 160px; display: flex; align-items: center; justify-content: center;
  font-size: 56px; position: relative;
}
.proj-body { padding: 22px 22px 24px; }
.proj-name { font-size: 17px; font-weight: 900; color: var(--navy); margin-bottom: 6px; }
.proj-client { font-size: 12px; color: var(--teal2); font-weight: 700; margin-bottom: 10px; font-style: italic; }
.proj-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 16px; }
.proj-tags { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 18px; }
.proj-tag {
  font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 20px;
  background: var(--bg3); color: var(--teal2);
  border: 1px solid rgba(0,180,216,0.2);
}
.proj-links { display: flex; gap: 10px; }
.proj-link {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; text-decoration: none;
  color: var(--text2); background: var(--bg2); border: 1.5px solid var(--border);
  padding: 7px 14px; border-radius: 50px; transition: all 0.2s;
}
.proj-link:hover { background: var(--teal); color: #fff; border-color: var(--teal); }

/* ══════════════════════════════════════
   TESTIMONIALS
══════════════════════════════════════ */
.testimonials-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
.test-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 16px; padding: 28px;
  box-shadow: var(--card-sh); transition: all 0.3s; position: relative;
}
.test-card:hover { transform: translateY(-5px); box-shadow: var(--card-sh-hover); border-color: rgba(0,180,216,0.3); }
.test-card::before {
  content: '"'; position: absolute; top: 12px; right: 18px;
  font-size: 72px; font-family: Georgia; color: rgba(0,180,216,0.10); line-height: 1;
}
.test-stars { display: flex; gap: 3px; margin-bottom: 14px; }
.test-stars span { color: var(--yellow); font-size: 16px; }
.test-body { font-size: 14px; color: var(--muted); line-height: 1.8; margin-bottom: 20px; font-style: italic; }
.test-author { display: flex; align-items: center; gap: 12px; }
.test-avatar {
  width: 46px; height: 46px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, var(--teal), var(--purple));
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 900; color: #fff;
  box-shadow: 0 3px 12px rgba(0,180,216,0.3);
}
.test-name { font-size: 14px; font-weight: 800; color: var(--navy); }
.test-role { font-size: 12px; color: var(--dim); }

/* ══════════════════════════════════════
   CONTACT
══════════════════════════════════════ */
.contact-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center; }
.contact-overline {
  font-size: 11px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--teal2); margin-bottom: 10px;
}
.contact-big {
  font-size: clamp(30px,4vw,50px); font-weight: 900; letter-spacing: -1px;
  color: var(--navy); line-height: 1.05; margin-bottom: 18px;
}
.contact-big span { color: var(--coral); }
.contact-sub { font-size: 15px; color: var(--muted); line-height: 1.8; margin-bottom: 28px; }
.contact-rows { display: flex; flex-direction: column; gap: 14px; }
.contact-row {
  display: flex; align-items: center; gap: 14px;
  font-size: 14px; color: var(--text2); text-decoration: none;
  transition: all 0.2s; font-weight: 600;
}
.contact-row:hover { color: var(--teal2); transform: translateX(5px); }
.c-ico {
  width: 42px; height: 42px; border-radius: 12px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all 0.25s;
  background: var(--bg3); border: 1.5px solid var(--border);
  box-shadow: var(--card-sh);
}
.contact-row:hover .c-ico {
  background: linear-gradient(135deg,var(--teal),#0077b6);
  border-color: transparent; box-shadow: 0 4px 16px rgba(0,150,199,0.35);
}

/* Form */
.form-card {
  background: var(--white); border: 1.5px solid var(--border);
  border-radius: 20px; padding: 40px;
  box-shadow: 0 12px 48px rgba(0,100,200,0.10);
}
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { margin-bottom: 18px; }
.form-label {
  font-size: 13px; font-weight: 700; color: var(--text2);
  margin-bottom: 7px; display: block; letter-spacing: 0.2px;
}
.form-control {
  width: 100%; background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: 10px; padding: 12px 16px;
  font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--text);
  outline: none; transition: all 0.25s; resize: none;
}
.form-control:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(0,180,216,0.15); background: #fff; }
textarea.form-control { height: 110px; }
.form-btn {
  width: 100%; background: linear-gradient(135deg,var(--teal),#0077b6);
  color: #fff; border: none; padding: 14px;
  font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
  cursor: pointer; border-radius: 50px; letter-spacing: 0.3px;
  transition: all 0.25s; box-shadow: 0 6px 24px rgba(0,150,199,0.35);
}
.form-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,150,199,0.5); }

/* ══════════════════════════════════════
   FOOTER — navy bg, matches reference
══════════════════════════════════════ */
.footer {
  background: var(--navy);
  padding: 56px 0 32px;
}
.footer-inner { max-width: 1200px; margin: 0 auto; padding: 0 56px; text-align: center; }
.footer-avatar {
  width: 96px; height: 96px; border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), var(--purple));
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; font-weight: 900; color: #fff;
  border: 3px solid rgba(255,255,255,0.2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.footer-name {
  font-family: 'Pacifico', cursive; font-size: 28px;
  color: #fff; margin-bottom: 10px; letter-spacing: 0.5px;
}
.footer-tagline { font-size: 14px; color: rgba(255,255,255,0.55); max-width: 500px; margin: 0 auto 10px; line-height: 1.7; }
.footer-loc { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 28px; display:flex; align-items:center; justify-content:center; gap:6px; }

/* ══════ HOOKS ══════ */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.fade-up,.fade-left,.fade-right');
    const obs = new IntersectionObserver(e => e.forEach(x => { if(x.isIntersecting) x.target.classList.add('vis'); }), {threshold:0.1});
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  });
}
function useSkillBars() {
  useEffect(() => {
    const bars = document.querySelectorAll('.skill-bar-fill');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if(e.isIntersecting) {
          setTimeout(()=>{ e.target.style.width = e.target.dataset.pct + '%'; }, 250);
          obs.unobserve(e.target);
        }
      });
    }, {threshold:0.1});
    bars.forEach(b => obs.observe(b));
    return () => obs.disconnect();
  });
}

/* ══════ APP ══════ */
function App() {
  const [active, setActive] = useState('home');
  useReveal();

  useEffect(()=>{
    const ids = ['home','whatido','skills','education','experience','projects','contact'];
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{ if(e.isIntersecting) setActive(e.target.id); });
    },{threshold:0.35});
    ids.forEach(id=>{ const el=document.getElementById(id); if(el) obs.observe(el); });
    return ()=>obs.disconnect();
  },[]);

  return (
    <>
      <Navbar active={active}/>
      <Hero/>
      <WhatIDo/>
      <Skills/>
      <EduExp/>
      <Projects/>
      
      <Contact/>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
